<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defending Democracy</title>
    <link rel="icon" type="image/png" href="./public/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: 'Inter', Arial, Helvetica, sans-serif;
            background-color: #000;
            color: rgba(255, 255, 255, 0.87);
        }
    </style>
</head>
<body class="bg-black text-white">
    <div id="app"></div>

    <script>
        // State management
        let currentPage = 'home';
        let currentImage = 0;
        let activity = '';
        let purpose = '';
        let location = '';
        let selectedCountry = '';
        let mapView = 'global';

        const images = [
            './public/images/hero-1.png',
            './public/images/hero-2.png',
            './public/images/hero-3.png',
            './public/images/hero-4.png',
            './public/images/hero-5.png',
        ];

        const unCountries = [
            'Afghanistan','Albania','Algeria','Andorra','Angola','Antigua and Barbuda','Argentina','Armenia','Australia','Austria','Azerbaijan','Bahamas','Bahrain','Bangladesh','Barbados','Belarus','Belgium','Belize','Benin','Bhutan','Bolivia','Bosnia and Herzegovina','Botswana','Brazil','Brunei','Bulgaria','Burkina Faso','Burundi','Cabo Verde','Cambodia','Cameroon','Canada','Central African Republic','Chad','Chile','China','Colombia','Comoros','Congo','Costa Rica','Côte d\'Ivoire','Croatia','Cuba','Cyprus','Czechia','Democratic Republic of the Congo','Denmark','Djibouti','Dominica','Dominican Republic','Ecuador','Egypt','El Salvador','Equatorial Guinea','Eritrea','Estonia','Eswatini','Ethiopia','Fiji','Finland','France','Gabon','Gambia','Georgia','Germany','Ghana','Greece','Grenada','Guatemala','Guinea','Guinea-Bissau','Guyana','Haiti','Honduras','Hungary','Iceland','India','Indonesia','Iran','Iraq','Ireland','Israel','Italy','Jamaica','Japan','Jordan','Kazakhstan','Kenya','Kiribati','Kuwait','Kyrgyzstan','Laos','Latvia','Lebanon','Lesotho','Liberia','Libya','Liechtenstein','Lithuania','Luxembourg','Madagascar','Malawi','Malaysia','Maldives','Mali','Malta','Marshall Islands','Mauritania','Mauritius','Mexico','Micronesia','Moldova','Monaco','Mongolia','Montenegro','Morocco','Mozambique','Myanmar','Namibia','Nauru','Nepal','Netherlands','New Zealand','Nicaragua','Niger','Nigeria','North Korea','North Macedonia','Norway','Oman','Pakistan','Palau','Panama','Papua New Guinea','Paraguay','Peru','Philippines','Poland','Portugal','Qatar','Romania','Russia','Rwanda','Saint Kitts and Nevis','Saint Lucia','Saint Vincent and the Grenadines','Samoa','San Marino','Sao Tome and Principe','Saudi Arabia','Senegal','Serbia','Seychelles','Sierra Leone','Singapore','Slovakia','Slovenia','Solomon Islands','Somalia','South Africa','South Korea','South Sudan','Spain','Sri Lanka','Sudan','Suriname','Sweden','Switzerland','Syria','Tajikistan','Tanzania','Thailand','Timor-Leste','Togo','Tonga','Trinidad and Tobago','Tunisia','Turkey','Turkmenistan','Tuvalu','Uganda','Ukraine','United Arab Emirates','United Kingdom','United States','Uruguay','Uzbekistan','Vanuatu','Vatican City','Venezuela','Vietnam','Yemen','Zambia','Zimbabwe'
        ];

        const events = [
            {
                title: 'Downtown cleanup drive',
                activity: 'Volunteer',
                purpose: 'Environmental',
                location: "5' miles",
                details: 'Volunteer • Environmental • 5 miles',
            },
            {
                title: 'Community voting rally',
                activity: 'Protest',
                purpose: 'Voting',
                location: "10' miles",
                details: 'Protest • Voting • 10 miles',
            },
            {
                title: 'Regional justice summit',
                activity: 'Volunteer',
                purpose: 'Gender Equality',
                location: "15' miles",
                details: 'Volunteer • Gender Equality • 15 miles',
            },
            {
                title: 'Neighborhood advocacy walk',
                activity: 'Protest',
                purpose: 'Racial Equality',
                location: "10' miles",
                details: 'Protest • Racial Equality • 10 miles',
            },
        ];

        function setPage(page) {
            currentPage = page;
            render();
        }

        function showPrevious() {
            currentImage = currentImage === 0 ? images.length - 1 : currentImage - 1;
            render();
        }

        function showNext() {
            currentImage = currentImage === images.length - 1 ? 0 : currentImage + 1;
            render();
        }

        function handleLocationChange(value) {
            location = value;
            if (value !== 'Select country') {
                selectedCountry = '';
                mapView = 'global';
            }
            render();
        }

        function handleCountrySelect(country) {
            selectedCountry = country;
            mapView = country === 'United States' ? 'us' : 'global';
            render();
        }

        function getFilteredEvents() {
            return events.filter((event) => {
                const matchesActivity = activity ? event.activity === activity : true;
                const matchesPurpose = purpose ? event.purpose === purpose : true;
                const matchesLocation = location ? event.location === location : true;
                return matchesActivity && matchesPurpose && matchesLocation;
            });
        }

        function renderTopNav() {
            return `
                <header class="sticky top-0 z-50 border-b border-white/10 bg-black/95 px-6 py-4 backdrop-blur-sm">
                    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4">
                        <button onclick="setPage('home')" class="rounded-3xl border border-white/10 bg-white/5 px-4 py-3 text-sm font-semibold uppercase tracking-[0.24em] text-white transition hover:border-white/20 hover:bg-white/10">
                            Defending Democracy
                        </button>

                        <nav class="hidden grow items-center justify-center gap-4 text-sm font-medium text-gray-300 md:flex">
                            <button onclick="setPage('home')" class="${currentPage === 'home' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'} rounded-full px-4 py-2 transition">Home</button>
                            <button onclick="setPage('about')" class="${currentPage === 'about' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'} rounded-full px-4 py-2 transition">About DD</button>
                            <button onclick="setPage('projects')" class="${currentPage === 'projects' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'} rounded-full px-4 py-2 transition">Projects</button>
                            <button onclick="setPage('issues')" class="${currentPage === 'issues' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'} rounded-full px-4 py-2 transition">Issues</button>
                            <button onclick="setPage('testimonies')" class="${currentPage === 'testimonies' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'} rounded-full px-4 py-2 transition">Testimonies</button>
                            <button onclick="setPage('students')" class="${currentPage === 'students' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'} rounded-full px-4 py-2 transition">For Students</button>
                            <button onclick="setPage('educate')" class="${currentPage === 'educate' ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-white'} rounded-full px-4 py-2 transition">Educate</button>
                        </nav>

                        <div class="flex items-center gap-4">
                            <img src="./src/assets/R.png" alt="Logo" class="h-12 w-12 object-contain">
                            <select onchange="setPage(this.value)" class="block md:hidden rounded-2xl border border-white/10 bg-black px-3 py-2 text-sm text-white outline-none">
                                <option value="home">Home</option>
                                <option value="about">About DD</option>
                                <option value="projects">Projects</option>
                                <option value="issues">Issues</option>
                                <option value="testimonies">Testimonies</option>
                                <option value="students">For Students</option>
                                <option value="educate">Educate</option>
                            </select>
                        </div>
                    </div>
                </header>
            `;
        }

        function renderHomePage() {
            const filteredEvents = getFilteredEvents();
            return `
                <div class="min-h-screen w-full bg-black text-white font-sans">
                    <div class="relative mx-auto flex min-h-screen max-w-7xl flex-col justify-between px-6 pb-12">
                        <div class="mt-10 w-full rounded-[2rem] border border-white/10 bg-zinc-950/80 p-6 shadow-2xl md:p-10">
                            <div class="grid gap-8 lg:grid-cols-[1.2fr_0.8fr] lg:items-center">
                                <div class="space-y-6">
                                    <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tight">The world needs you.</h1>
                                    <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
                                        <p class="text-lg md:text-xl text-gray-200 max-w-xl font-medium leading-relaxed">
                                            Youth across the globe are finding their voices. At Defending Democracy, we amplify those voices for the whole world to hear.
                                        </p>
                                        <button onclick="setPage('about')" class="inline-block bg-[#D10024] hover:bg-red-700 text-white font-bold px-10 py-3 text-center transition-colors duration-200 whitespace-nowrap">
                                            About DD
                                        </button>
                                    </div>
                                </div>
                                <div class="relative h-[320px] overflow-hidden rounded-[1.5rem] border border-white/10">
                                    <img src="${images[currentImage]}" alt="Hero background" class="h-full w-full object-cover">
                                    <div class="absolute inset-0 bg-black/20"></div>
                                </div>
                            </div>
                        </div>

                        <div class="w-full">
                            <div class="mb-4 flex items-center justify-between">
                                <button onclick="showPrevious()" class="rounded-full border border-white/40 bg-white/10 p-3 text-xl transition hover:bg-white/20" aria-label="Previous image">
                                    &#8249;
                                </button>
                                <div class="grid grid-cols-5 gap-2 h-[3px] bg-white/20 flex-1 mx-4">
                                    ${images.map((_, index) => `<div class="h-full ${index === currentImage ? 'bg-white' : 'bg-white/30'}"></div>`).join('')}
                                </div>
                                <button onclick="showNext()" class="rounded-full border border-white/40 bg-white/10 p-3 text-xl transition hover:bg-white/20" aria-label="Next image">
                                    &#8250;
                                </button>
                            </div>
                            <div class="flex items-center justify-between text-xs font-semibold tracking-widest text-gray-300">
                                <span>${currentImage + 1} / ${images.length}</span>
                                <span>Swipe through the story</span>
                            </div>
                        </div>

                        <section class="mt-10 rounded-[2rem] border border-white/10 bg-zinc-950/80 p-6 shadow-2xl md:p-8">
                            <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                                <p class="text-xl font-semibold text-white">I am interested in</p>
                                <div class="flex flex-col gap-3 md:flex-row md:flex-wrap">
                                    <label class="flex flex-col text-sm font-medium text-gray-300">
                                        <span class="mb-1">Activity</span>
                                        <select onchange="activity = this.value; render()" class="rounded-lg border border-white/10 bg-black px-3 py-2 text-white outline-none">
                                            <option value="">Choose activity</option>
                                            <option>Protest</option>
                                            <option>Volunteer</option>
                                            <option>Cleanup</option>
                                        </select>
                                    </label>
                                    <label class="flex flex-col text-sm font-medium text-gray-300">
                                        <span class="mb-1">Purpose</span>
                                        <select onchange="purpose = this.value; render()" class="rounded-lg border border-white/10 bg-black px-3 py-2 text-white outline-none">
                                            <option value="">Choose purpose</option>
                                            <option>Environmental</option>
                                            <option>Voting</option>
                                            <option>Womans Rights</option>
                                            <option>Gender Equality</option>
                                            <option>Racial Equality</option>
                                        </select>
                                    </label>
                                    <label class="flex flex-col text-sm font-medium text-gray-300">
                                        <span class="mb-1">Location</span>

                                            <option>15' miles</option>

                                    <p class="text-sm text-gray-400">Hover over highlighted areas to explore local events.</p>
                                </div>
                                <div class="rounded-full border border-red-500/30 bg-red-500/10 px-3 py-1 text-sm text-red-300">Live map preview</div>
                            </div>

                            <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
                                <div class="relative overflow-hidden rounded-[1.5rem] border border-white/10 bg-transparent p-4">

                                </div>

                                        </div>
                                    ` : filteredEvents.map((event, index) => `
                                        <div class="rounded-[1.25rem] border border-white/10 bg-black/50 p-4">

        function renderAboutPage() {
            return `
                <div class="space-y-8">
                    <section class="rounded-[2rem] border border-white/10 bg-zinc-950/80 p-8 shadow-2xl">
                        <div class="max-w-4xl space-y-6">
                            <p class="text-sm uppercase tracking-[0.32em] text-red-400">About Defending Democracy</p>
                            <h1 class="text-4xl font-black uppercase tracking-tight text-white">A movement for youth-led civic action</h1>
                            <p class="text-lg leading-relaxed text-gray-300">
                                Defending Democracy connects young people with projects that protect rights, strengthen communities, and build a healthier future. Using this platform, we make civic engagement easy to explore, understand, and join.
                            </p>
                            <div class="grid gap-6 md:grid-cols-2">
                                <div class="rounded-[1.5rem] border border-white/10 bg-black/50 p-6">
                                    <h2 class="text-xl font-semibold text-white">Who we are</h2>
                                    <p class="mt-3 text-sm leading-6 text-gray-300">
                                        A network of young volunteers, organizers, and educators who believe every voice matters. We support local and international efforts that fight for equity and strengthen democracy.
                                    </p>
                                </div>
                                <div class="rounded-[1.5rem] border border-white/10 bg-black/50 p-6">
                                    <h2 class="text-xl font-semibold text-white">What we do</h2>
                                    <p class="mt-3 text-sm leading-6 text-gray-300">
                                        We bring together causes, stories, and learning resources so students and young people can discover opportunities by issue, by region, and by impact.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </section>
                    <section class="grid gap-6 md:grid-cols-3">
                        <div class="rounded-[1.5rem] border border-white/10 bg-black/50 p-6">
                            <h3 class="text-xl font-semibold text-white">Our mission</h3>
                            <p class="mt-3 text-sm leading-6 text-gray-300">Build an easy way for youth to find civic projects, support democratic values, and take action on issues that matter.</p>
                        </div>
                        <div class="rounded-[1.5rem] border border-white/10 bg-black/50 p-6">
                            <h3 class="text-xl font-semibold text-white">Why it matters</h3>
                            <p class="mt-3 text-sm leading-6 text-gray-300">Democracy works when more people participate. We help young leaders turn awareness into action and connection into real change.</p>
                        </div>
                        <div class="rounded-[1.5rem] border border-white/10 bg-black/50 p-6">
                            <h3 class="text-xl font-semibold text-white">How to join</h3>
                            <p class="mt-3 text-sm leading-6 text-gray-300">Explore activities, choose an issue, and connect to projects or resources that match your interests and experience level.</p>
                        </div>
                    </section>
                </div>
            `;
        }

        function renderProjectsPage() {

                { name: 'Community Clean-Up', category: 'Environmental', location: 'Local', summary: 'Volunteer crews restore parks, collect waste, and advocate for cleaner public spaces.' },
                { name: 'Equality Dialogue Series', category: 'Gender Equality', location: 'Global', summary: 'Virtual roundtables connecting youth leaders across borders to discuss equity and justice.' },
                { name: 'Rights Awareness Workshop', category: 'Civil Rights', location: 'Regional', summary: 'Practical sessions on voting rights, protest safety, and digital civic participation.' },
            ];
            return `
                <div class="space-y-8">
                    <section class="rounded-[2rem] border border-white/10 bg-zinc-950/80 p-8 shadow-2xl">
                        <p class="text-sm uppercase tracking-[0.32em] text-red-400">Projects</p>
                        <h1 class="mt-3 text-4xl font-black uppercase tracking-tight text-white">Explore community-led action</h1>
                        <p class="mt-4 max-w-2xl text-lg leading-relaxed text-gray-300">

                        </p>
                    </section>
                    <section class="grid gap-6 md:grid-cols-2">
                        ${projects.map(p => `
                            <div class="rounded-[1.75rem] border border-white/10 bg-black/50 p-6">
                                <div class="flex items-center justify-between gap-4">
                                    <div>
                                        <p class="text-sm uppercase tracking-[0.3em] text-red-400">${p.category}</p>
                                        <h2 class="mt-3 text-2xl font-semibold text-white">${p.name}</h2>

                            </div>

            return `
                <div class="space-y-8">

                        <h1 class="mt-3 text-4xl font-black uppercase tracking-tight text-white">The topics we focus on</h1>
                        <p class="mt-4 max-w-2xl text-lg leading-relaxed text-gray-300">

                    <div class="grid gap-6 lg:grid-cols-[1.4fr_0.6fr]">

                                <div class="rounded-[1.75rem] border border-white/10 bg-black/50 p-6">

                                    <p class="mt-3 text-sm leading-6 text-gray-300">${issue.detail}</p>

                        <div class="rounded-[1.75rem] border border-white/10 bg-black/50 p-6">
                            <h2 class="text-xl font-semibold text-white">Issue categories</h2>
                            <ul class="mt-4 space-y-3 text-gray-300">

                                <li>Gender Equality</li>
                                <li>Racial Equality</li>

                                <li>Civil Engagement</li>

                        </div>

                { name: 'Tariq', role: 'Student Leader', quote: 'I learned how to turn my passion for voting rights into an action plan in my community.' },

            return `

                    <section class="rounded-[2rem] border border-white/10 bg-zinc-950/80 p-8 shadow-2xl">

        function renderStudentsPage() {
            const cards = [
                { title: 'DD Database', description: 'A searchable guide to student-centered programs and civic resources.' },
                { title: 'Teaching Resources', description: 'Lesson plans, toolkits, and tips for educators and campus organizers.' },
                { title: 'Student Stories', description: 'Profiles of youth leaders who used civic action to create change.' },

            return `
                <div class="space-y-8">
                    <section class="rounded-[2rem] border border-white/10 bg-zinc-950/80 p-8 shadow-2xl">
                        <p class="text-sm uppercase tracking-[0.32em] text-red-400">For students</p>
                        <h1 class="mt-3 text-4xl font-black uppercase tracking-tight text-white">Opportunities for every level</h1>

                        </p>
                    </section>
                    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                        ${cards.map(card => `
                            <div class="rounded-[1.75rem] border border-white/10 bg-black/50 p-6">
                                <h2 class="text-2xl font-semibold text-white">${card.title}</h2>
                                <p class="mt-3 text-sm leading-6 text-gray-300">${card.description}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderEducatePage() {
            const resources = [
                { title: 'Civic Learning', subtitle: 'DD Database', description: 'Search guides, reports, and classroom-ready content for youth civic engagement.' },
                { title: 'Teaching materials', subtitle: 'Embedded lessons', description: 'Resources for educators who want to bring democracy, protest, and rights into the classroom.' },
                { title: 'Topic exploration', subtitle: 'Research & tools', description: 'Dive deeper into each issue with curated readings, videos, and downloadable guides.' },
            ];
            return `
                <div class="space-y-8">
                    <section class="rounded-[2rem] border border-white/10 bg-zinc-950/80 p-8 shadow-2xl">
                        <p class="text-sm uppercase tracking-[0.32em] text-red-400">Educate</p>
                        <h1 class="mt-3 text-4xl font-black uppercase tracking-tight text-white">Learn more, take action</h1>
                        <p class="mt-4 max-w-2xl text-lg leading-relaxed text-gray-300">
                            A place for teaching resources, toolkits, and deeper context on the issues that shape youth civic engagement around the world.
                        </p>
                    </section>
                    <div class="grid gap-6 lg:grid-cols-3">
                        ${resources.map(resource => `
                            <div class="rounded-[1.75rem] border border-white/10 bg-black/50 p-6">
                                <p class="text-sm uppercase tracking-[0.24em] text-red-400">${resource.subtitle}</p>
                                <h2 class="mt-3 text-2xl font-semibold text-white">${resource.title}</h2>
                                <p class="mt-3 text-sm leading-6 text-gray-300">${resource.description}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function render() {
            let content = '';
            
            if (currentPage === 'home') {
                content = renderHomePage();
            } else if (currentPage === 'about') {
                content = renderAboutPage();
            } else if (currentPage === 'projects') {
                content = renderProjectsPage();
            } else if (currentPage === 'issues') {
                content = renderIssuesPage();
            } else if (currentPage === 'testimonies') {
                content = renderTestimoniesPage();
            } else if (currentPage === 'students') {
                content = renderStudentsPage();
            } else if (currentPage === 'educate') {
                content = renderEducatePage();
            }

            document.getElementById('app').innerHTML = renderTopNav() + `<main class="mx-auto max-w-7xl px-6 py-8">${content}</main>`;
        }

        // Initial render
        render();
    </script>
</body>
</html>
